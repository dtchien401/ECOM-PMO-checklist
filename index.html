  <style>
    :root{
      --red:#d71920;
      --dark:#111827;
      --muted:#6b7280;
      --line:#e5e7eb;
      --bg:#f7f8fb;
      --card:#ffffff;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(215,25,32,.12), transparent 30%),
        linear-gradient(180deg,#ffffff 0%,var(--bg) 42%,#eef1f6 100%);
      color:var(--dark);
    }
    .glass{
      background:rgba(255,255,255,.78);
      backdrop-filter: blur(14px);
      border:1px solid rgba(255,255,255,.65);
      box-shadow:0 14px 36px rgba(17,24,39,.08);
    }
    .card{
      background:var(--card);
      border:1px solid var(--line);
      box-shadow:0 10px 26px rgba(17,24,39,.06);
    }
    .pill{border:1px solid var(--line); background:#fff}
    .pill.active{background:#111827;color:#fff;border-color:#111827}
    .ws-foundation{border-top-color:#d71920}
    .ws-setup{border-top-color:#111827}
    .ws-marketing{border-top-color:#64748b}
    .task:hover{transform:translateY(-1px); box-shadow:0 14px 28px rgba(17,24,39,.09)}
    .status-dot{width:9px;height:9px;border-radius:999px;display:inline-block}
    .dot-now{background:#f59e0b}
    .dot-upcoming{background:#94a3b8}
    .dot-past{background:#ef4444}
    .dot-done{background:#22c55e}
    .dot-planned{background:#64748b}
    .month-badge{letter-spacing:.16em}

    .timeline-scroll{scrollbar-width:thin; scrollbar-color:#cbd5e1 transparent}
    .timeline-node{min-width:178px; position:relative}
    .timeline-node:before{content:""; position:absolute; top:31px; left:-50%; width:100%; height:2px; background:#e5e7eb; z-index:0}
    .timeline-node:first-child:before{display:none}
    .timeline-dot{position:relative; z-index:1}
    .timeline-tooltip{opacity:0; visibility:hidden; transform:translateY(8px); transition:.18s ease; pointer-events:none; position:absolute; left:0; top:78px; width:320px; z-index:50}
    .timeline-node:hover .timeline-tooltip{opacity:1; visibility:visible; transform:translateY(0)}
    .launch-pulse{box-shadow:0 0 0 0 rgba(215,25,32,.42); animation:pulseLaunch 1.8s infinite}
    @keyframes pulseLaunch{70%{box-shadow:0 0 0 12px rgba(215,25,32,0)}100%{box-shadow:0 0 0 0 rgba(215,25,32,0)}}
    .progress-track{height:9px; background:#e5e7eb; border-radius:999px; overflow:hidden}
    .progress-fill{height:100%; background:#111827; border-radius:999px}
    details summary::-webkit-details-marker{display:none}
  </style>

      "workstream": "marketing",
      "workstreamName": "Marketing / Growth",
      "owner": "THUỶ, NELLY, CƯỜNG",
      "title": "Launching affiliate qua agency",
      "sourceCell": "E10",
      "status": "Planned"
    }
  ]
}</script>

  <script>
    const TODAY = new Date();
    const FALLBACK = JSON.parse(document.getElementById('fallback-data').textContent);
    const state = {
      data: FALLBACK,
      filter: 'all',
      week: 'all',
      search: ''
    };

    const fmtDate = (iso) => {
      if(!iso) return '';
      const d = new Date(iso + 'T00:00:00');
      return d.toLocaleDateString('vi-VN', {day:'2-digit', month:'2-digit'});
    };

    const daysLeft = (launchDate) => {
      const launch = new Date(launchDate + 'T00:00:00');
      const today = new Date(TODAY.getFullYear(), TODAY.getMonth(), TODAY.getDate());
      return Math.ceil((launch - today) / (1000*60*60*24));
    };

    const derivedStatus = (task) => {
      const manual = (task.status || '').toLowerCase();
      if(['done','completed','complete'].includes(manual)) return {key:'done', label:'Done', dot:'dot-done'};
      if(['blocked','blocker'].includes(manual)) return {key:'blocked', label:'Blocked', dot:'dot-past'};
      const start = new Date(task.startDate + 'T00:00:00');
      const end = new Date(task.endDate + 'T23:59:59');
      if(TODAY >= start && TODAY <= end) return {key:'now', label:'This week', dot:'dot-now'};
      if(TODAY > end) return {key:'past', label:'Review', dot:'dot-past'};
      return {key:'upcoming', label:'Upcoming', dot:'dot-upcoming'};
    };

    const groupBy = (arr, keyFn) => arr.reduce((acc,x)=>{
      const k = keyFn(x);
      (acc[k] ||= []).push(x);
      return acc;
    }, {});

    function slugify(str){
      return String(str || 'workstream')
        .normalize('NFD').replace(/[\u0300-\u036f]/g,'')
        .toLowerCase()
        .replace(/[^a-z0-9]+/g,'-')
        .replace(/(^-|-$)/g,'') || 'workstream';
    }

    function monthNameFromNumber(mm){
      return ['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'][Number(mm)-1] || '';
    }

    function isoFromDDMM(ddmm, fallbackYear=2026){
      if(!ddmm) return '';
      const m = String(ddmm).trim().match(/^(\d{1,2})[\/\-.](\d{1,2})(?:[\/\-.](\d{2,4}))?$/);
      if(!m) return '';
      const dd = String(m[1]).padStart(2,'0');
      const mm = String(m[2]).padStart(2,'0');
      let yy = m[3] ? String(m[3]) : String(fallbackYear);
      if(yy.length === 2) yy = '20' + yy;
      return `${yy}-${mm}-${dd}`;
    }

    function normalizeData(raw){
      const base = raw || {};
      const fallbackLaunch = base.launchDate || FALLBACK.launchDate || '2026-07-15';

      // Schema 1: already in dashboard format
      if(Array.isArray(base.weeks) && Array.isArray(base.workstreams) && Array.isArray(base.tasks) && base.tasks.some(t=>t.title || t.weekId)){
        return {
          ...base,
          project: base.project || 'ECOM PMO',
          sheet: base.sheet || base.sourceSheet || 'Weekly Check-list',
          launchDate: fallbackLaunch
        };
      }

      // Schema 2: flat Office Script JSON: { updatedAt, sourceSheet, tasks:[{week, weekStart, weekEnd, workstream, owner, task, status, note}] }
      const rawTasks = Array.isArray(base.tasks) ? base.tasks : [];
      const wsMap = new Map();
      const weekMap = new Map();
      const tasks = rawTasks.map((t, idx)=>{
        const startDate = t.startDate || isoFromDDMM(t.weekStart || t.start || t.week_start);
        const endDate = t.endDate || isoFromDDMM(t.weekEnd || t.end || t.week_end);
        const month = (t.month && String(t.month).trim()) || monthNameFromNumber((startDate || '').slice(5,7));
        const weekCode = t.weekCode || t.week || `W${idx+1}`;
        const weekId = t.weekId || `${month || 'PERIOD'}-${weekCode}`.replace(/\s+/g,'-');
        const weekLabel = t.weekLabel || `${weekCode} ${t.weekStart || fmtDate(startDate)} - ${t.weekEnd || fmtDate(endDate)}`;

        const wsName = t.workstreamName || t.workstream || 'General';
        const wsKey = t.workstreamKey || slugify(wsName);
        if(!wsMap.has(wsKey)) wsMap.set(wsKey, {key:wsKey, name:wsName, owner:t.owner || '', col:t.sourceColumn || ''});
        if(!weekMap.has(weekId)) weekMap.set(weekId, {id:weekId, month, label:weekLabel, weekCode, startDate, endDate, sourceRow:t.sourceRow || ''});

        return {
          ...t,
          id: t.id || `${weekId}-${wsKey}-${idx+1}`,
          month,
          weekId,
          weekLabel,
          weekCode,
          startDate,
          endDate,
          workstream: wsKey,
          workstreamName: wsName,
          owner: t.owner || '',
          title: t.title || t.task || t.name || '',
          sourceCell: t.sourceCell || '',
          status: t.status || 'Planned',
          note: t.note || ''
        };
      });

      const weeks = Array.from(weekMap.values()).sort((a,b)=>String(a.startDate).localeCompare(String(b.startDate)));
      const workstreams = Array.from(wsMap.values());
      return {
        project: base.project || 'ECOM PMO',
        sheet: base.sheet || base.sourceSheet || 'Weekly Check-list',
        launchDate: fallbackLaunch,
        generatedFrom: base.generatedFrom || 'weekly-update.json',
        updatedAt: base.updatedAt || '',
        totalTasks: tasks.length,
        workstreams,
        weeks,
        tasks
      };
    }

    function loadData(){
      state.data = normalizeData(state.data);
      fetch('weekly-update.json', {cache:'no-store'})
        .then(r => r.ok ? r.json() : Promise.reject(new Error('JSON not found')))
        .then(json => { state.data = normalizeData(json); render(); })
        .catch(() => render());
    }

    function filteredTasks(){
      let tasks = state.data.tasks || [];
      if(state.filter !== 'all'){
        const wsKeys = (state.data.workstreams || []).map(ws => ws.key);
        if(wsKeys.includes(state.filter)){
          tasks = tasks.filter(t => t.workstream === state.filter);
        }else{
          tasks = tasks.filter(t => derivedStatus(t).key === state.filter);
        }
      }
      if(state.week !== 'all'){
        tasks = tasks.filter(t => t.weekId === state.week);
      }
      if(state.search.trim()){
        const s = state.search.toLowerCase();
        tasks = tasks.filter(t =>
          [t.title, t.task, t.owner, t.weekLabel, t.workstreamName, t.sourceCell, t.note].join(' ').toLowerCase().includes(s)
        );
      }
      return tasks;
    }

    function summary(tasks){
      const byWS = groupBy(tasks, t=>t.workstream);
      const total = tasks.length;
      const now = tasks.filter(t=>derivedStatus(t).key==='now').length;
      const past = tasks.filter(t=>derivedStatus(t).key==='past').length;
      const upcoming = tasks.filter(t=>derivedStatus(t).key==='upcoming').length;
      return {total, now, past, upcoming, byWS};
    }

    function taskCard(t){
      const st = derivedStatus(t);
      return `
        <div class="task rounded-2xl border border-slate-200 bg-white p-4 transition duration-200" title="${taskTooltip(t)}">
          <div class="flex items-start justify-between gap-3 mb-3">
            <div class="flex items-center gap-2">
              <span class="status-dot ${st.dot}"></span>
              <span class="text-[11px] font-bold uppercase tracking-wider text-slate-500">${st.label}</span>
            </div>
            <span class="text-[11px] font-semibold text-slate-400">${t.sourceCell || ''}</span>
          </div>
          <div class="text-[15px] leading-snug font-semibold text-slate-900">${escapeHtml(t.title || '')}</div>
          <div class="mt-4 flex flex-wrap gap-2 text-xs">
            <span class="rounded-full bg-slate-100 px-2.5 py-1 font-semibold text-slate-700">${escapeHtml(t.weekLabel || '')}</span>
            <span class="rounded-full bg-slate-100 px-2.5 py-1 text-slate-600">${fmtDate(t.startDate)} - ${fmtDate(t.endDate)}</span>
          </div>
          <div class="mt-3 text-xs text-slate-500">
            Owner: <span class="font-semibold text-slate-700">${escapeHtml(t.owner || '')}</span>
          </div>
        </div>
      `;
    }

    function escapeHtml(str){
      return String(str)
        .replaceAll('&','&amp;')
        .replaceAll('<','&lt;')
        .replaceAll('>','&gt;')
        .replaceAll('"','&quot;')
        .replaceAll("'","&#039;");
    }

    function render(){
      state.data = normalizeData(state.data);
      const data = state.data;
      const tasks = filteredTasks();
      const sum = summary(data.tasks || []);
      const launchLeft = daysLeft(data.launchDate);
      const wsList = data.workstreams || [];

      document.getElementById('app').innerHTML = `
        <header class="glass rounded-[28px] px-6 md:px-8 py-7 mb-6">
          <div class="flex flex-col lg:flex-row lg:items-end lg:justify-between gap-5">
            <div>
              <div class="inline-flex items-center gap-2 rounded-full bg-red-50 border border-red-100 px-3 py-1 mb-4">
                <span class="w-2 h-2 rounded-full bg-[var(--red)]"></span>
                <span class="text-xs font-bold uppercase tracking-[.22em] text-red-700">Weekly Check-list</span>
              </div>
              <h1 class="text-3xl md:text-5xl font-black tracking-tight">ECOM Launch PMO Dashboard</h1>
              <p class="mt-3 text-slate-500 max-w-3xl">
                Map trực tiếp từ sheet <b>${escapeHtml(data.sheet || '')}</b>. Mỗi task card giữ lại <b>source cell</b> để cross-check với Excel.
              </p>
            </div>
            <div class="rounded-3xl bg-slate-950 text-white p-5 min-w-[260px]">
              <div class="text-xs uppercase tracking-[.18em] text-slate-400">Launch Target</div>
              <div class="mt-1 text-3xl font-black">${fmtDate(data.launchDate)}/2026</div>
              <div class="mt-2 text-sm text-slate-300">${launchLeft >= 0 ? `${launchLeft} days to launch` : `${Math.abs(launchLeft)} days after launch`}</div>
            </div>
          </div>
        </header>

        <section class="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-6">
          ${metricCard('Total Tasks', sum.total, 'Mapped from Excel cells')}
          ${metricCard('This Week', sum.now, 'Current active week')}
          ${metricCard('Review / Past', sum.past, 'Past week items')}
          ${metricCard('Upcoming', sum.upcoming, 'Future week items')}
        </section>

        <section class="card rounded-[28px] p-4 md:p-5 mb-6">
          <div class="flex flex-col xl:flex-row xl:items-center gap-3 justify-between">
            <div class="flex flex-wrap gap-2">
              ${filterBtn('all','All')}
              ${wsList.map(ws => filterBtn(ws.key, ws.name)).join('')}
              ${filterBtn('now','This Week')}
              ${filterBtn('upcoming','Upcoming')}
              ${filterBtn('past','Review')}
            </div>
            <div class="flex flex-col sm:flex-row gap-2">
              <select id="weekFilter" class="pill rounded-xl px-3 py-2 text-sm outline-none">
                <option value="all">All weeks</option>
                ${(data.weeks || []).map(w=>`<option value="${w.id}" ${state.week===w.id?'selected':''}>${w.month} ${w.label}</option>`).join('')}
              </select>
              <input id="searchBox" value="${escapeHtml(state.search)}" placeholder="Search task / owner / cell..." class="pill rounded-xl px-3 py-2 text-sm outline-none min-w-[240px]"/>
            </div>
          </div>
        </section>

        ${executiveTimelineSection(data)}

        <section class="grid grid-cols-1 lg:grid-cols-3 gap-5 mb-8">
          ${wsList.map(ws => workstreamColumn(ws, tasks.filter(t=>t.workstream===ws.key))).join('')}
        </section>

        <section class="card rounded-[28px] p-5 md:p-6">
          <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-3 mb-5">
            <div>
              <h2 class="text-xl font-black">Roadmap Overview</h2>
              <p class="text-sm text-slate-500">Tổng quan theo tuần và workstream. Khi JSON có deadline chi tiết, timeline sẽ tự ưu tiên deadline theo ngày.</p>
            </div>
          </div>
          <div class="space-y-3">
            ${(data.weeks || []).map(w => weekRow(w, (data.tasks || []).filter(t=>t.weekId===w.id))).join('')}
          </div>
        </section>
      `;

      document.querySelectorAll('[data-filter]').forEach(btn=>{
        btn.addEventListener('click', ()=>{
          state.filter = btn.dataset.filter;
          render();
        });
      });
      document.getElementById('weekFilter').addEventListener('change', e=>{
        state.week = e.target.value;
        render();
      });
      document.getElementById('searchBox').addEventListener('input', e=>{
        state.search = e.target.value;
        render();
      });
    }


    function safeDate(iso){
      if(!iso) return null;
      const d = new Date(iso + 'T00:00:00');
      return isNaN(d) ? null : d;
    }

    function dateFromTask(t){
      if(t.deadline) return safeDate(t.deadline);
      const title = String(t.title || '');
      const m = title.match(/(^|\s)(\d{1,2})[\.\/](\d{1,2})(?=\D|$)/);
      if(m){
        const day = Number(m[2]);
        const month = Number(m[3]);
        const year = t.startDate ? Number(t.startDate.slice(0,4)) : TODAY.getFullYear();
        const d = new Date(year, month-1, day);
        if(!isNaN(d)) return d;
      }
      return safeDate(t.startDate);
    }

    function shortText(str, max=34){
      str = String(str || '').trim();
      return str.length > max ? str.slice(0, max-1).trim() + '…' : str;
    }

    function taskTooltip(t){
      return escapeHtml([
        t.title || '',
        `Owner: ${t.owner || ''}`,
        `Week: ${t.weekLabel || ''}`,
        `Workstream: ${t.workstreamName || ''}`,
        `Source: ${t.sourceCell || ''}`
      ].join('\n'));
    }

    function nextMilestone(tasks, launchDate){
      const today = new Date(TODAY.getFullYear(), TODAY.getMonth(), TODAY.getDate());
      const candidates = (tasks || []).map(t => ({type:'task', task:t, date:dateFromTask(t)})).filter(x=>x.date && x.date >= today);
      const launch = safeDate(launchDate);
      if(launch && launch >= today){ candidates.push({type:'launch', date:launch}); }
      candidates.sort((a,b)=>a.date-b.date);
      return candidates[0] || null;
    }

    function daysBetween(a,b){
      const da = new Date(a.getFullYear(), a.getMonth(), a.getDate());
      const db = new Date(b.getFullYear(), b.getMonth(), b.getDate());
      return Math.ceil((db-da)/(1000*60*60*24));
    }

    function weekTooltip(w, weekTasks){
      const byWs = groupBy(weekTasks, t=>t.workstreamName || t.workstream || 'Other');
      const sections = Object.keys(byWs).map(k=>`
        <div class="mb-3 last:mb-0">
          <div class="text-[11px] font-black uppercase tracking-wider text-slate-400 mb-1">${escapeHtml(k)}</div>
          <ul class="space-y-1">
            ${byWs[k].map(t=>`<li class="text-xs leading-snug text-slate-700">• ${escapeHtml(t.title || '')}<span class="text-slate-400"> ${escapeHtml(t.sourceCell || '')}</span></li>`).join('')}
          </ul>
        </div>`).join('');
      return sections || '<div class="text-xs text-slate-400">No tasks</div>';
    }

    function weekStatusClass(w){
      const start = safeDate(w.startDate);
      const end = w.endDate ? new Date(w.endDate + 'T23:59:59') : null;
      if(start && end && TODAY >= start && TODAY <= end) return {dot:'bg-amber-500', text:'This week', ring:'ring-amber-100'};
      if(end && TODAY > end) return {dot:'bg-red-600', text:'Review', ring:'ring-red-100'};
      return {dot:'bg-slate-800', text:'Upcoming', ring:'ring-slate-100'};
    }

    function executiveTimelineSection(data){
      const allTasks = data.tasks || [];
      const milestone = nextMilestone(allTasks, data.launchDate);
      return `
        <section class="grid grid-cols-1 xl:grid-cols-[1fr_340px] gap-5 mb-8">
          <div class="card rounded-[28px] p-5 md:p-6 overflow-visible">
            <div class="flex flex-col md:flex-row md:items-end md:justify-between gap-3 mb-5">
              <div>
                <div class="text-xs uppercase tracking-[.18em] text-red-700 font-black">Executive Roadmap</div>
                <h2 class="mt-1 text-2xl font-black">Launch Timeline</h2>
                <p class="text-sm text-slate-500">Hiện tagline theo tuần. Hover vào từng mốc để xem đầy đủ task, owner và source cell.</p>
              </div>
              <div class="text-xs text-slate-400 font-semibold">Source: weekly-update.json</div>
            </div>
            <div class="timeline-scroll overflow-x-auto pb-28 -mb-24">
              <div class="flex gap-6 min-w-max px-1 py-2">
                ${(data.weeks || []).map(w => timelineWeekNode(w, allTasks.filter(t=>t.weekId===w.id))).join('')}
                ${timelineLaunchNode(data.launchDate)}
              </div>
            </div>
          </div>
          ${nextMilestoneCard(milestone)}
        </section>
      `;
    }

    function timelineWeekNode(w, tasks){
      const st = weekStatusClass(w);
      const tagline = tasks.slice(0,2).map(t=>shortText(t.title, 20)).join(' + ') || 'No task';
      return `
        <div class="timeline-node">
          <div class="flex flex-col items-start">
            <div class="timeline-dot w-16 h-16 rounded-2xl bg-white ring-8 ${st.ring} border border-slate-200 flex items-center justify-center shadow-sm">
              <span class="w-3 h-3 rounded-full ${st.dot}"></span>
            </div>
            <div class="mt-3">
              <div class="text-[11px] font-black uppercase tracking-[.16em] text-red-700">${escapeHtml(w.month || '')}</div>
              <div class="text-sm font-black text-slate-900">${escapeHtml(w.weekCode || '')} · ${fmtDate(w.startDate)}-${fmtDate(w.endDate)}</div>
              <div class="mt-1 text-xs font-semibold text-slate-500 max-w-[160px]">${escapeHtml(tagline)}</div>
            </div>
          </div>
          <div class="timeline-tooltip rounded-2xl bg-white border border-slate-200 shadow-2xl p-4">
            <div class="flex items-start justify-between gap-3 mb-3">
              <div>
                <div class="text-[11px] font-black uppercase tracking-[.16em] text-red-700">${escapeHtml(w.month || '')} ${escapeHtml(w.weekCode || '')}</div>
                <div class="font-black text-slate-900">${escapeHtml(w.label || '')}</div>
                <div class="text-xs text-slate-400">Source row ${w.sourceRow || ''}</div>
              </div>
              <span class="rounded-full bg-slate-100 px-2 py-1 text-[11px] font-bold text-slate-600">${tasks.length} tasks</span>
            </div>
            ${weekTooltip(w, tasks)}
          </div>
        </div>
      `;
    }

    function timelineLaunchNode(launchDate){
      if(!launchDate) return '';
      return `
        <div class="timeline-node">
          <div class="flex flex-col items-start">
            <div class="timeline-dot launch-pulse w-16 h-16 rounded-2xl bg-red-600 text-white ring-8 ring-red-100 flex items-center justify-center shadow-sm text-2xl">🚀</div>
            <div class="mt-3">
              <div class="text-[11px] font-black uppercase tracking-[.16em] text-red-700">LAUNCH</div>
              <div class="text-sm font-black text-slate-900">${fmtDate(launchDate)}</div>
              <div class="mt-1 text-xs font-semibold text-slate-500 max-w-[160px]">ECOM go-live target</div>
            </div>
          </div>
          <div class="timeline-tooltip rounded-2xl bg-white border border-red-100 shadow-2xl p-4">
            <div class="text-[11px] font-black uppercase tracking-[.16em] text-red-700">Launch Target</div>
            <div class="mt-1 text-xl font-black text-slate-900">15/07/2026</div>
            <div class="mt-2 text-xs text-slate-500">Mốc go-live chính của ECOM PMO dashboard.</div>
          </div>
        </div>
      `;
    }

    function nextMilestoneCard(m){
      const today = new Date(TODAY.getFullYear(), TODAY.getMonth(), TODAY.getDate());
      if(!m){
        return `<div class="card rounded-[28px] p-6 flex flex-col justify-center"><div class="text-xs uppercase tracking-[.18em] text-slate-400 font-black">Next Milestone</div><div class="mt-3 text-2xl font-black">No upcoming milestone</div></div>`;
      }
      const left = daysBetween(today, m.date);
      if(m.type === 'launch'){
        return `
          <div class="rounded-[28px] bg-slate-950 text-white p-6 relative overflow-hidden">
            <div class="absolute -right-8 -top-8 w-32 h-32 rounded-full bg-red-600/30"></div>
            <div class="text-xs uppercase tracking-[.18em] text-red-300 font-black">Next Milestone</div>
            <div class="mt-4 text-5xl font-black">${fmtDate(m.date.toISOString().slice(0,10))}</div>
            <div class="mt-3 text-xl font-black">🚀 Launch Target</div>
            <div class="mt-2 text-sm text-slate-300">${left} days left</div>
          </div>`;
      }
      const t = m.task;
      return `
        <div class="rounded-[28px] bg-slate-950 text-white p-6 relative overflow-hidden">
          <div class="absolute -right-8 -top-8 w-32 h-32 rounded-full bg-red-600/30"></div>
          <div class="text-xs uppercase tracking-[.18em] text-red-300 font-black">Next Milestone</div>
          <div class="mt-4 text-5xl font-black">${fmtDate(m.date.toISOString().slice(0,10))}</div>
          <div class="mt-3 text-xl font-black leading-tight">${escapeHtml(shortText(t.title, 52))}</div>
          <div class="mt-3 flex flex-wrap gap-2 text-xs">
            <span class="rounded-full bg-white/10 px-3 py-1 font-bold">${escapeHtml(t.workstreamName || '')}</span>
            <span class="rounded-full bg-white/10 px-3 py-1 font-bold">${escapeHtml(t.sourceCell || '')}</span>
          </div>
          <div class="mt-4 text-sm text-slate-300">${left} days left · ${escapeHtml(t.owner || '')}</div>
        </div>`;
    }

    function metricCard(label, value, note){
      return `
        <div class="card rounded-3xl p-5">
          <div class="text-xs uppercase tracking-[.18em] text-slate-400 font-bold">${label}</div>
          <div class="mt-2 text-4xl font-black">${value}</div>
          <div class="mt-1 text-sm text-slate-500">${note}</div>
        </div>
      `;
    }

    function filterBtn(key,label){
      const active = state.filter === key ? 'active' : '';
      return `<button data-filter="${key}" class="pill ${active} rounded-xl px-4 py-2 text-sm font-bold transition">${label}</button>`;
    }


    function workstreamProgress(wsKey){
      const tasks = (state.data.tasks || []).filter(t=>t.workstream===wsKey);
      const total = tasks.length || 0;
      const completed = tasks.filter(t=>['done','completed','complete'].includes(String(t.status||'').toLowerCase())).length;
      const review = tasks.filter(t=>derivedStatus(t).key==='past').length;
      const value = total ? Math.round(((completed || review) / total) * 100) : 0;
      const label = completed ? 'Completion' : 'Timeline passed / review';
      return `
        <div class="mt-4 rounded-2xl bg-slate-50 border border-slate-200 p-3">
          <div class="flex items-center justify-between text-xs mb-2">
            <span class="font-bold text-slate-500">${label}</span>
            <span class="font-black text-slate-900">${value}%</span>
          </div>
          <div class="progress-track"><div class="progress-fill" style="width:${value}%"></div></div>
        </div>
      `;
    }

    function workstreamColumn(ws, tasks){
      const cls = ws.key === 'foundation' ? 'ws-foundation' : ws.key === 'setup' ? 'ws-setup' : 'ws-marketing';
      const grouped = groupBy(tasks, t=>t.weekId);
      return `
        <div class="card ${cls} rounded-[28px] border-t-4 p-4 md:p-5 min-h-[520px]">
          <div class="mb-5">
            <div class="flex items-center justify-between gap-3">
              <h2 class="text-2xl font-black">${escapeHtml(ws.name)}</h2>
              <span class="rounded-full bg-slate-100 px-3 py-1 text-xs font-bold">${tasks.length} tasks</span>
            </div>
            <p class="mt-1 text-sm text-slate-500">${escapeHtml(ws.owner || '')}</p>
            ${workstreamProgress(ws.key)}
          </div>

          <div class="space-y-4">
            ${tasks.length ? Object.keys(grouped).map(weekId => {
              const weekTasks = grouped[weekId];
              const first = weekTasks[0];
              return `
                <details open class="rounded-2xl bg-slate-50 border border-slate-200 p-3">
                  <summary class="cursor-pointer flex items-center justify-between">
                    <span class="font-black text-sm">${escapeHtml(first.month)} ${escapeHtml(first.weekLabel)}</span>
                    <span class="text-xs font-bold text-slate-500">${weekTasks.length}</span>
                  </summary>
                  <div class="mt-3 space-y-3">
                    ${weekTasks.map(taskCard).join('')}
                  </div>
                </details>
              `;
            }).join('') : `<div class="rounded-2xl bg-slate-50 border border-dashed border-slate-300 p-6 text-center text-slate-400">No tasks</div>`}
          </div>
        </div>
      `;
    }

    function weekRow(w, tasks){
      const byWs = groupBy(tasks, t=>t.workstream);
      const now = tasks.filter(t=>derivedStatus(t).key==='now').length;
      return `
        <div class="rounded-2xl border border-slate-200 bg-white p-4">
          <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-3">
            <div>
              <div class="text-xs font-black month-badge text-red-700">${escapeHtml(w.month || '')}</div>
              <div class="font-black">${escapeHtml(w.label || '')}</div>
              <div class="text-xs text-slate-500">${fmtDate(w.startDate)} - ${fmtDate(w.endDate)} · Source row ${w.sourceRow}</div>
            </div>
            <div class="flex flex-wrap gap-2 text-xs">
              ${(state.data.workstreams || []).map(ws => `<span class="rounded-full bg-slate-100 px-3 py-1 font-bold">${escapeHtml(ws.name)}: ${(byWs[ws.key]||[]).length}</span>`).join('')}
              ${now ? `<span class="rounded-full bg-amber-100 text-amber-800 px-3 py-1 font-bold">This week</span>` : ''}
            </div>
          </div>
        </div>
      `;
    }

    loadData();
  </script>
</body>
</html>
